spring:
  cinfig:
    import: database-config.yml

  application:
    name: carrito-service

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s

    instances:
      cliente-service:
        base-config: default
        ignore-exceptions:
          - feign.FeignException.NotFound
          - com.electrodostore.carrito_service.exception.ClienteNotFoundException

      producto-service:
        base-config: default
        ignore-exceptions:
          - feign.FeignException.NotFound
          - com.electrodostore.carrito_service.exception.ProductoNotFoundException
          - com.electrodostore.carrito_service.exception.ProductoStockInsuficienteException

      venta-service:
        base-config: default
        ignore-exceptions:
          - feign.FeignException.NotFound
          - com.electrodostore.carrito_service.exception.ProductoNotFoundException
          - com.electrodostore.carrito_service.exception.ProductoStockInsuficienteException
          - com.electrodostore.carrito_service.exception.ClienteNotFoundException

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}

server:
  port: ${PORT:8282}
spring:
  application:
    name: carrito-service

  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: ${DB_URL}

  jpa:
    hibernate:
      ddl-auto: update

    database-platform: org.hibernate.dialect.MySQLDialect

    open-in-view: false

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 30s

    instances:
      cliente-service:
        base-config: default
        ignore-exceptions:
          - feign.FeignException.NotFound
          - com.electrodostore.carrito_service.exception.ClienteNotFoundException

      producto-service:
        base-config: default
        ignore-exceptions:
          - feign.FeignException.NotFound
          - com.electrodostore.carrito_service.exception.ProductoNotFoundException
          - com.electrodostore.carrito_service.exception.ProductoStockInsuficienteException

      venta-service:
        base-config: default
        ignore-exceptions:
          - feign.FeignException.NotFound
          - com.electrodostore.carrito_service.exception.ProductoNotFoundException
          - com.electrodostore.carrito_service.exception.ProductoStockInsuficienteException
          - com.electrodostore.carrito_service.exception.ClienteNotFoundException

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}

server:
  port: ${PORT:8282}
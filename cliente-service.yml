spring:
  application:
    name: cliente-service

  datasource:
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: ${DB_URL}

  jpa:
    hibernate:
      ddl-auto: update

    database-platform: org.hibernate.dialect.MySQLDialect

    open-in-view: false

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL}

server:
  port: ${PORT:8080}